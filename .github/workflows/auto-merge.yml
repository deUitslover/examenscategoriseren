name: Auto-merge PRs

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: (startsWith(github.event.pull_request.title, 'Modus A:') || startsWith(github.event.pull_request.title, 'Modus B:')) && startsWith(github.event.pull_request.head.ref, 'claude/')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Merge PR
        run: gh pr merge --squash "${{ github.event.pull_request.number }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
